<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="#1a1a1a"/>
  <!-- Notepad -->
  <rect x="18" y="16" width="60" height="72" rx="4" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <!-- Spine -->
  <rect x="18" y="16" width="9" height="72" rx="3" fill="#534AB7"/>
  <!-- AI text shadow -->
  <text x="51" y="65" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="32" fill="#3C3489" opacity="0.5">AI</text>
  <!-- AI text -->
  <text x="50" y="63" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="32" fill="#AFA9EC">AI</text>
  <!-- Pencil group rotated -->
  <g transform="translate(52, 42) rotate(-35)">
    <!-- Eraser -->
    <rect x="-4" y="-31" width="8" height="7" rx="1" fill="#ED93B1"/>
    <!-- Eraser band -->
    <rect x="-4" y="-25" width="8" height="3" fill="#B4B2A9"/>
    <!-- Pencil body -->
    <rect x="-4" y="-22" width="8" height="34" fill="#EF9F27"/>
    <!-- Tip -->
    <polygon points="-4,12 4,12 0,21" fill="#D3D1C7"/>
    <!-- Lead -->
    <polygon points="-1,17 1,17 0,21" fill="#2C2C2A"/>
  </g>
</svg>
